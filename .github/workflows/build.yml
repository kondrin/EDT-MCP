name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Cache Tycho P2 repositories
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository/.cache/tycho
            ~/.m2/repository/p2
          key: ${{ runner.os }}-tycho-p2-${{ hashFiles('**/pom.xml', '**/*.target') }}
          restore-keys: |
            ${{ runner.os }}-tycho-p2-

      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Maven build
        working-directory: mcp
        env:
          MAVEN_OPTS: -Xmx2g -XX:+UseParallelGC
        run: mvn clean verify --batch-mode --no-transfer-progress -T 1C

      - name: JaCoCo coverage report
        working-directory: mcp
        run: mvn --batch-mode --no-transfer-progress -pl bundles/com.ditrix.edt.mcp.server jacoco:report

      - name: SonarQube Cloud analysis
        if: env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        working-directory: mcp
        env:
          MAVEN_OPTS: -Xmx2g -XX:+UseParallelGC
        run: mvn --batch-mode --no-transfer-progress -T 1C sonar:sonar

      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        continue-on-error: true
        with:
          files: |
            mcp/tests/**/target/surefire-reports/*.xml

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP 'Bundle-Version:\s*\K[\d.]+' mcp/bundles/com.ditrix.edt.mcp.server/META-INF/MANIFEST.MF)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: MCP-EDT.v${{ steps.version.outputs.version }}
          path: mcp/repositories/com.ditrix.edt.mcp.server.repository/target/repository/
